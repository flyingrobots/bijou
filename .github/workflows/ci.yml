name: CI

on:
  push:
    branches: [main]
    tags: [ "v*.*.*", "v*.*.*-*" ]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - name: Design-system docs preflight
        if: matrix.node-version == 22
        run: npm run docs:design-system:preflight
      - run: npm test
      - name: Typecheck tests
        if: matrix.node-version == 22
        run: npm run typecheck:test
      - name: Smoke canary apps
        if: matrix.node-version == 22
        run: npm run smoke:canaries -- --skip-build

  smoke_examples:
    name: Smoke examples (${{ matrix.lane.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lane:
          - label: pipe
            command: smoke:examples:pipe
          - label: static
            command: smoke:examples:static
          - label: interactive
            command: smoke:examples:interactive
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ${{ matrix.lane.command }}
