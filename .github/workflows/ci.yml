name: CI

on:
  push:
    branches: [main]
    tags: [ "v*.*.*", "v*.*.*-*" ]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      dogfood: ${{ steps.dogfood.outputs.dogfood }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Classify DOGFOOD relevance
        id: dogfood
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            echo "dogfood=true" >> "$GITHUB_OUTPUT"
            echo "DOGFOOD CI path gate: full proof for ${GITHUB_EVENT_NAME}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          is_dogfood_relevant() {
            case "$1" in
              .github/workflows/*) return 0 ;;
              package.json|package-lock.json) return 0 ;;
              packages/*) return 0 ;;
              examples/docs/*) return 0 ;;
              scripts/dogfood-*) return 0 ;;
              scripts/smoke-dogfood*) return 0 ;;
              tests/cycles/DF-*) return 0 ;;
              tests/cycles/*dogfood*) return 0 ;;
              docs/DOGFOOD.md) return 0 ;;
              docs/design/DF-*) return 0 ;;
              docs/legends/DF-*) return 0 ;;
              docs/method/legends/DF-*) return 0 ;;
            esac

            return 1
          }

          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            diff_args=(HEAD^1 HEAD)
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            diff_args=(FETCH_HEAD...HEAD)
          fi

          dogfood=false
          while IFS= read -r path; do
            if is_dogfood_relevant "$path"; then
              dogfood=true
            fi
          done < <(git diff --name-only "${diff_args[@]}")

          echo "dogfood=${dogfood}" >> "$GITHUB_OUTPUT"
          echo "DOGFOOD CI path gate: ${dogfood}" >> "$GITHUB_STEP_SUMMARY"

  test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run code:size
      - name: Design-system docs preflight
        if: matrix.node-version == 22
        run: npm run docs:design-system:preflight
      - name: DOGFOOD coverage gate
        if: matrix.node-version == 22 && needs.changes.outputs.dogfood == 'true'
        run: npm run dogfood:coverage:gate
      - name: DOGFOOD i18n policy gate
        if: matrix.node-version == 22 && needs.changes.outputs.dogfood == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            npm run dogfood:i18n:complete -- --base FETCH_HEAD
            npm run dogfood:i18n:debt -- --base FETCH_HEAD
          else
            npm run dogfood:i18n:complete -- --base HEAD^
            npm run dogfood:i18n:debt -- --base HEAD^
          fi
          npm run dogfood:i18n:check
      - run: npm test
      - name: Smoke interactive examples
        if: matrix.node-version == 22
        run: npm run verify:interactive-examples
      - name: Typecheck tests
        if: matrix.node-version == 22
        run: npm run typecheck:test
      - name: Smoke canary apps
        if: matrix.node-version == 22
        run: npm run smoke:canaries -- --skip-build

  unit_cross_platform:
    name: Focused Unit Tests (${{ matrix.label }}, Node 22)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu
            os: ubuntu-latest
          - label: windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck:test
      - name: Focused portable unit tests
        run: npm test -- --run packages/bijou-tui/src/eventbus.test.ts packages/bijou-tui/src/pipeline/pipeline.test.ts packages/bijou-node/src/index.test.ts scripts/check-node-version.test.ts scripts/docs-preview-components.test.ts scripts/docs-preview-entry.test.ts scripts/docs-preview-landing.test.ts scripts/docs-preview-search.test.ts scripts/docs-preview-theme.test.ts

  smoke_dogfood:
    name: Smoke DOGFOOD (${{ matrix.lane.label }})
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        lane:
          - label: landing
            command: smoke:dogfood:landing
          - label: docs
            command: smoke:dogfood:docs
    steps:
      - name: Skip unrelated DOGFOOD smoke
        if: needs.changes.outputs.dogfood != 'true'
        run: echo "DOGFOOD smoke skipped because no DOGFOOD-relevant paths changed."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.dogfood == 'true'
      - uses: actions/setup-node@v6
        if: needs.changes.outputs.dogfood == 'true'
        with:
          node-version: "22"
          cache: npm
      - if: needs.changes.outputs.dogfood == 'true'
        run: npm ci
      - if: needs.changes.outputs.dogfood == 'true'
        run: npm run build
      - if: needs.changes.outputs.dogfood == 'true'
        run: npm run ${{ matrix.lane.command }}

  bench_gradient:
    name: Bench Gradient
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run trusted gradient benchmark lane
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/bijou-bench"
          mkdir -p "$OUT_DIR"
          npm run -s bench:ci:gradient -- --out "$OUT_DIR/gradient-ci.json" > "$OUT_DIR/gradient-ci-summary.md"
          {
            echo '## Gradient Benchmark'
            echo
            echo 'Informational wall-time benchmark lane for the fixed gradient stress scenarios.'
            echo
            cat "$OUT_DIR/gradient-ci-summary.md"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-gradient
          path: |
            ${{ runner.temp }}/bijou-bench/gradient-ci.json
            ${{ runner.temp }}/bijou-bench/gradient-ci-summary.md
