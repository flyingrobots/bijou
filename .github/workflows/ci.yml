name: CI

on:
  push:
    branches: [main]
    tags: [ "v*.*.*", "v*.*.*-*" ]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - name: Design-system docs preflight
        if: matrix.node-version == 22
        run: npm run docs:design-system:preflight
      - name: DOGFOOD coverage gate
        if: matrix.node-version == 22
        run: npm run dogfood:coverage:gate
      - run: npm test
      - name: Typecheck tests
        if: matrix.node-version == 22
        run: npm run typecheck:test
      - name: Smoke canary apps
        if: matrix.node-version == 22
        run: npm run smoke:canaries -- --skip-build

  smoke_dogfood:
    name: Smoke DOGFOOD (${{ matrix.lane.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lane:
          - label: landing
            command: smoke:dogfood:landing
          - label: docs
            command: smoke:dogfood:docs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ${{ matrix.lane.command }}
