name: Release Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      notes_tag: ${{ steps.meta.outputs.notes_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Compute dry-run metadata
        id: meta
        run: |
          npx tsx scripts/release-metadata.ts \
            --current-version \
            --notes-tag-run-id "${{ github.run_id }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check tests
        run: npm run typecheck:test

      - name: DOGFOOD coverage gate
        run: npm run dogfood:coverage:gate

      - name: Test
        run: npm test

      - name: Smoke interactive examples
        run: npm run verify:interactive-examples

      - name: Smoke canary apps
        run: npm run smoke:canaries -- --skip-build

      - name: Verify packed files
        run: |
          (cd packages/bijou && npm pack --dry-run)
          (cd packages/bijou-node && npm pack --dry-run)
          (cd packages/bijou-tui && npm pack --dry-run)
          (cd packages/bijou-tui-app && npm pack --dry-run)
          (cd packages/create-bijou-tui-app && npm pack --dry-run)
          (cd packages/bijou-i18n && npm pack --dry-run)
          (cd packages/bijou-i18n-tools && npm pack --dry-run)
          (cd packages/bijou-i18n-tools-node && npm pack --dry-run)
          (cd packages/bijou-i18n-tools-xlsx && npm pack --dry-run)
          (cd packages/bijou-mcp && npm pack --dry-run)

  smoke_dogfood:
    name: Smoke DOGFOOD (${{ matrix.lane.label }})
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        lane:
          - label: landing
            command: smoke:dogfood:landing
          - label: docs
            command: smoke:dogfood:docs
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run ${{ matrix.lane.command }}

  npm_publish_dry_run:
    name: npm publish dry-run
    runs-on: ubuntu-latest
    needs: [verify, smoke_dogfood]
    strategy:
      matrix:
        package: [bijou, bijou-node, bijou-tui, bijou-tui-app, create-bijou-tui-app, bijou-i18n, bijou-i18n-tools, bijou-i18n-tools-node, bijou-i18n-tools-xlsx, bijou-mcp]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Verify trusted-publishing toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          NPM_VERSION="$(npm --version)"
          echo "$NPM_VERSION"
          export NPM_VERSION
          node --input-type=module <<'EOF'
          const version = process.env.NPM_VERSION ?? '0.0.0';
          const [major = 0, minor = 0, patch = 0] = version
            .split('.')
            .map((part) => Number.parseInt(part, 10));
          const isSupported =
            major > 11 ||
            (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));

          if (!isSupported) {
            console.error(
              `npm ${version} is too old for trusted publishing; need >=11.5.1`,
            );
            process.exit(1);
          }
          EOF

      - name: npm publish dry-run packages/${{ matrix.package }}
        run: cd packages/${{ matrix.package }} && npm publish --dry-run --access public --tag dry-run

  release_notes_preview:
    name: Release notes preview
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - name: Generate notes preview
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ needs.verify.outputs.notes_tag }}" \
            -f target_commitish="${{ github.sha }}" \
            > GENERATED_RELEASE.json

          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const payload = JSON.parse(readFileSync('GENERATED_RELEASE.json', 'utf8'));
          const body = String(payload.body ?? '').trim();
          const version = '${{ needs.verify.outputs.version }}';
          const tag = '${{ needs.verify.outputs.notes_tag }}';

          writeFileSync(
            'RELEASE_NOTES_PREVIEW.md',
            [
              `# Release Dry Run Notes`,
              ``,
              `Version: \`${version}\``,
              `Preview tag: \`${tag}\``,
              ``,
              body,
              ``,
            ].join('\n'),
          );
          EOF

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes-preview
          path: RELEASE_NOTES_PREVIEW.md
