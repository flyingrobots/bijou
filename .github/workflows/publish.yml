name: Release

on:
  push:
    tags: [ "v*.*.*", "v*.*.*-*" ]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify metadata and run tests
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      npm_dist_tag: ${{ steps.meta.outputs.npm_dist_tag }}
      release_sha: ${{ steps.release_sha.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Validate release metadata
        id: meta
        run: |
          npx tsx scripts/release-metadata.ts \
            --tag "${{ github.ref_name }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Capture verified release commit
        id: release_sha
        shell: bash
        run: |
          set -euo pipefail
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check tests
        run: npm run typecheck:test

      - name: Test
        run: npm test

      - name: Smoke all examples
        run: npm run smoke:examples:all

      - name: Smoke canary apps
        run: npm run smoke:canaries -- --skip-build

      - name: Verify published files
        run: |
          (cd packages/bijou && npm pack --dry-run)
          (cd packages/bijou-node && npm pack --dry-run)
          (cd packages/bijou-tui && npm pack --dry-run)
          (cd packages/bijou-tui-app && npm pack --dry-run)
          (cd packages/create-bijou-tui-app && npm pack --dry-run)

  publish_npm:
    name: Publish npm (OIDC)
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    environment: npm
    strategy:
      matrix:
        package: [bijou, bijou-node, bijou-tui, bijou-tui-app, create-bijou-tui-app]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Upgrade npm CLI (>=11.5.1 for trusted publishing)
        run: npm i -g npm@latest

      - name: Publish packages/${{ matrix.package }}
        uses: ./.github/actions/retry
        with:
          attempts: "3"
          delay_seconds: "15"
          command: cd packages/${{ matrix.package }} && npm publish --access public --tag "${{ needs.verify.outputs.npm_dist_tag }}" --provenance

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, publish_npm]
    if: ${{ always() && needs.verify.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_sha }}

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.verify.outputs.tag }}"
          TARGET_SHA="${{ needs.verify.outputs.release_sha }}"

          cat > RELEASE_SUMMARY.md << 'EOF'
          ## Registry publish summary

          - npm: `${{ needs.publish_npm.result }}`

          Dist-tag: `${{ needs.verify.outputs.npm_dist_tag }}`
          Version: `${{ needs.verify.outputs.tag_version }}`

          If npm failed, re-run only that job from Actions.
          EOF

          gh api \
            -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$TARGET_SHA" \
            > GENERATED_RELEASE.json

          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const payload = JSON.parse(readFileSync('GENERATED_RELEASE.json', 'utf8'));
          const releaseName = String(payload.name ?? '').trim();
          const generatedBody = String(payload.body ?? '').trim();
          const summary = readFileSync('RELEASE_SUMMARY.md', 'utf8').trim();
          const body = [generatedBody, summary].filter(Boolean).join('\n\n') + '\n';

          writeFileSync('RELEASE_BODY.md', body);
          writeFileSync('RELEASE_NAME.txt', `${releaseName}\n`);
          EOF

          echo "release_name=$(cat RELEASE_NAME.txt)" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.verify.outputs.tag }}"
          RELEASE_NAME="${{ steps.notes.outputs.release_name }}"
          REPO="${{ github.repository }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$REPO" \
              --title "$RELEASE_NAME" \
              --notes-file RELEASE_BODY.md
          else
            PRERELEASE_ARGS=()
            if [[ "${{ needs.verify.outputs.is_prerelease }}" == "true" ]]; then
              PRERELEASE_ARGS+=(--prerelease)
            fi

            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$RELEASE_NAME" \
              --notes-file RELEASE_BODY.md \
              "${PRERELEASE_ARGS[@]}"
          fi

      - name: Fail if npm publish failed
        if: ${{ needs.publish_npm.result != 'success' }}
        run: |
          echo "npm publish failed."
          exit 1
