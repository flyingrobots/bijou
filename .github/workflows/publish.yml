name: Release

on:
  push:
    tags: [ "v*.*.*", "v*.*.*-*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or recover (for example v4.1.0)
        required: true
        type: string
      ref:
        description: Git ref to checkout for the release workflow. Defaults to the tag when omitted.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify metadata and run tests
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      npm_dist_tag: ${{ steps.meta.outputs.npm_dist_tag }}
      release_sha: ${{ steps.release_sha.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Validate release metadata
        id: meta
        run: |
          npx tsx scripts/release-metadata.ts \
            --tag "${{ github.event.inputs.tag || github.ref_name }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Capture verified release commit
        id: release_sha
        shell: bash
        run: |
          set -euo pipefail
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check tests
        run: npm run typecheck:test

      - name: DOGFOOD coverage gate
        run: npm run dogfood:coverage:gate

      - name: Test
        run: npm test

      - name: Smoke canary apps
        run: npm run smoke:canaries -- --skip-build

      - name: Verify published files
        run: |
          (cd packages/bijou && npm pack --dry-run)
          (cd packages/bijou-node && npm pack --dry-run)
          (cd packages/bijou-tui && npm pack --dry-run)
          (cd packages/bijou-tui-app && npm pack --dry-run)
          (cd packages/create-bijou-tui-app && npm pack --dry-run)
          (cd packages/bijou-i18n && npm pack --dry-run)
          (cd packages/bijou-i18n-tools && npm pack --dry-run)
          (cd packages/bijou-i18n-tools-node && npm pack --dry-run)
          (cd packages/bijou-i18n-tools-xlsx && npm pack --dry-run)
          (cd packages/bijou-mcp && npm pack --dry-run)

  smoke_dogfood:
    name: Smoke DOGFOOD (${{ matrix.lane.label }})
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        lane:
          - label: landing
            command: smoke:dogfood:landing
          - label: docs
            command: smoke:dogfood:docs
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run ${{ matrix.lane.command }}

  publish_npm:
    name: Publish npm (OIDC)
    runs-on: ubuntu-latest
    needs: [verify, smoke_dogfood]
    permissions:
      contents: read
      id-token: write
    environment: npm
    strategy:
      matrix:
        package: [bijou, bijou-node, bijou-tui, bijou-tui-app, create-bijou-tui-app, bijou-i18n, bijou-i18n-tools, bijou-i18n-tools-node, bijou-i18n-tools-xlsx, bijou-mcp]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Verify trusted-publishing toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          NPM_VERSION="$(npm --version)"
          echo "$NPM_VERSION"
          export NPM_VERSION
          node --input-type=module <<'EOF'
          const version = process.env.NPM_VERSION ?? '0.0.0';
          const [major = 0, minor = 0, patch = 0] = version
            .split('.')
            .map((part) => Number.parseInt(part, 10));
          const isSupported =
            major > 11 ||
            (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));

          if (!isSupported) {
            console.error(
              `npm ${version} is too old for trusted publishing; need >=11.5.1`,
            );
            process.exit(1);
          }
          EOF

      - name: Publish packages/${{ matrix.package }}
        uses: ./.github/actions/retry
        with:
          attempts: "3"
          delay_seconds: "15"
          command: cd packages/${{ matrix.package }} && npm publish --access public --tag "${{ needs.verify.outputs.npm_dist_tag }}" --provenance

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, smoke_dogfood, publish_npm]
    if: ${{ always() && needs.verify.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_sha }}

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.verify.outputs.tag }}"
          TARGET_SHA="${{ needs.verify.outputs.release_sha }}"

          cat > RELEASE_SUMMARY.md << 'EOF'
          ## Registry publish summary

          - npm: `${{ needs.publish_npm.result }}`

          Dist-tag: `${{ needs.verify.outputs.npm_dist_tag }}`
          Version: `${{ needs.verify.outputs.tag_version }}`

          If npm failed, fix the publish workflow and re-run this workflow
          with `workflow_dispatch` against the same tag.
          EOF

          gh api \
            -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$TARGET_SHA" \
            > GENERATED_RELEASE.json

          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const payload = JSON.parse(readFileSync('GENERATED_RELEASE.json', 'utf8'));
          const releaseName = String(payload.name ?? '').trim();
          const generatedBody = String(payload.body ?? '').trim();
          const summary = readFileSync('RELEASE_SUMMARY.md', 'utf8').trim();
          const body = [generatedBody, summary].filter(Boolean).join('\n\n') + '\n';

          writeFileSync('RELEASE_BODY.md', body);
          writeFileSync('RELEASE_NAME.txt', `${releaseName}\n`);
          EOF

          echo "release_name=$(cat RELEASE_NAME.txt)" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.verify.outputs.tag }}"
          RELEASE_NAME="${{ steps.notes.outputs.release_name }}"
          REPO="${{ github.repository }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$REPO" \
              --title "$RELEASE_NAME" \
              --notes-file RELEASE_BODY.md
          else
            PRERELEASE_ARGS=()
            if [[ "${{ needs.verify.outputs.is_prerelease }}" == "true" ]]; then
              PRERELEASE_ARGS+=(--prerelease)
            fi

            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$RELEASE_NAME" \
              --notes-file RELEASE_BODY.md \
              "${PRERELEASE_ARGS[@]}"
          fi

      - name: Fail if npm publish failed
        if: ${{ needs.publish_npm.result != 'success' }}
        run: |
          echo "npm publish failed."
          exit 1
